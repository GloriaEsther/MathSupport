<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sube tus ecuaciones</title>

  <!-- Bootstrap y Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Estilos personalizados -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #764ba2;
      margin: 0;
      padding: 0;
    }

    .main-content {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 60px); /* deja espacio para el menú */
      padding: 20px;
    }

    .form-container {
      background: white;
      padding: 20px 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
    }

    h1 {
      font-size: 1.5em;
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 10px;
    }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #cf1010;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
    }

    button:hover {
      background-color: red;
    }

    .header {
      background-color: #333;
      color: white;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      position: relative;
    }

    .label_hamburguesa {
      cursor: pointer;
      display: block;
    }

    .menu_hamburguesa {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .ul_links {
      list-style: none;
      background-color: #444;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }

    .ul_links li {
      border-bottom: 1px solid #555;
    }

    .ul_links .link {
      display: block;
      padding: 15px 20px;
      color: white;
      text-decoration: none;
    }

    .ul_links .link:hover {
      background-color: #555;
    }

    .menu_hamburguesa:checked + .ul_links {
      max-height: 200px;
    }

    .list_icon {
      fill: white;
    }

    @media (min-width: 768px) {
      .label_hamburguesa {
        display: none;
      }

      .ul_links {
        display: flex;
        max-height: none;
      }

      .ul_links li {
        border: none;
      }

      .ul_links .link {
        padding: 10px 15px;
      }
    }

    @media (max-width: 600px) {
      .form-container {
        padding: 15px 20px;
      }

      h1 {
        font-size: 1.3em;
      }
    }
  </style>

  {% load static %}
  <link rel="manifest" href="{% static 'pwa/manifest.json' %}" />
  <meta name="theme-color" content="#007bff" />
  <link rel="icon" href="{% static 'pwa/icons/logo_android-chrome-192x192.png' %}" />

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register("{% static 'pwa/service-worker.js' %}")
        .then(reg => console.log('Service Worker registrado', reg))
        .catch(err => console.error('Error al registrar el Service Worker', err));
    }
  </script>
</head>
<body>
  <!-- Menú hamburguesa -->
  <header class="header">
    <nav class="navbar">
      <label class="label_hamburguesa" for="menu_hamburguesa">
        <svg xmlns="http://www.w3.org/2000/svg" width="35" height="35" fill="currentColor" class="list_icon" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5"/>
        </svg>
      </label>
      <input class="menu_hamburguesa" type="checkbox" id="menu_hamburguesa" />
      <ul class="ul_links">
        <li><a href="{% url 'historial_problemas' %}" class="link"><i class="bi bi-journal-check"></i> Problemas Resueltos</a></li>
        <li><a href="{% url 'bienvenida' %}" class="link"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</a></li>
      </ul>
    </nav>
  </header>

  {% if messages %}
    <div class="modal fade show" tabindex="-1" style="display:block; background-color: rgba(0,0,0,0.5);" role="dialog">
      <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
          <div class="modal-header bg-success text-white">
            <h5 class="modal-title">Mensaje</h5>
          </div>
          <div class="modal-body">
            {% for message in messages %}
              <p>{{ message }}</p>
            {% endfor %}
          </div>
          <div class="modal-footer">
            <a href="{% url 'ocr_view' %}" class="btn btn-primary">Aceptar</a>
          </div>
        </div>
      </div>
    </div>
  {% endif %}

  <!-- Contenido centrado -->
  <div class="main-content">
    <div class="form-container">
      <h1>Sube tus imágenes</h1>
      <p style="text-align: center;">(Una imagen por ecuación o restricción)</p>
      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <label for="images">Imágenes de las ecuaciones:</label>
        <input type="file" name="images" id="images" accept="image/*" multiple required />
        <button type="submit">Procesar imágenes</button>
      </form>
    </div>
  </div>
</body>
</html>
